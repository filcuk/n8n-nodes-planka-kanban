name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@filcuk'
          always-auth: true

      - name: Install dependencies
        run: npm ci

      - name: Configure package for GitHub Packages
        run: |
          npm pkg set name="@filcuk/n8n-nodes-planka-kanban"
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"
          npm pkg set repository="https://github.com/filcuk/n8n-nodes-planka-v2.git"
          node <<'EOF'
          const fs = require('fs');
          const lockPath = 'package-lock.json';
          const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
          lock.name = '@filcuk/n8n-nodes-planka-kanban';
          if (lock.packages?.['']) {
            lock.packages[''].name = '@filcuk/n8n-nodes-planka-kanban';
          }
          fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, '\t')}\n`);
          EOF
          echo "Package manifest:"
          node -pe "JSON.stringify(require('./package.json'), null, 2)"
          echo "Tarball contents:"
          npm pack --dry-run

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GitHub Packages publish
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          npm view "@filcuk/n8n-nodes-planka-kanban@${VERSION}" version --registry=https://npm.pkg.github.com
          echo "Published @filcuk/n8n-nodes-planka-kanban@${VERSION} to GitHub Packages"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish summary
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          {
            echo "### GitHub Packages"
            echo ""
            echo "Published \`@filcuk/n8n-nodes-planka-kanban@${VERSION}\`"
            echo ""
            echo "- Package page: https://github.com/users/filcuk/packages/npm/package/n8n-nodes-planka-kanban"
            echo "- Repo packages: https://github.com/filcuk/n8n-nodes-planka-v2/packages"
            echo ""
            echo "If the package does not appear under the repository, open the package page → **Package settings** → **Manage Actions access** / **Connect repository** and link \`filcuk/n8n-nodes-planka-v2\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to npm
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set — skipping npm publish."
            exit 0
          fi
          npm pkg set name="n8n-nodes-planka-kanban"
          npm pkg delete publishConfig
          npm pkg set repository="https://github.com/filcuk/n8n-nodes-planka-v2.git"
          node <<'EOF'
          const fs = require('fs');
          const lockPath = 'package-lock.json';
          const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
          lock.name = 'n8n-nodes-planka-kanban';
          if (lock.packages?.['']) {
            lock.packages[''].name = 'n8n-nodes-planka-kanban';
          }
          fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, '\t')}\n`);
          EOF
          npm publish --access public --registry=https://registry.npmjs.org
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
